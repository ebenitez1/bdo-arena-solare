<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO Arena of Solare — Top 100</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111418;
    --surface2: #181c22;
    --border: #2a2f3a;
    --gold: #c8922a;
    --gold-light: #e8b84b;
    --blue: #4a90d9;
    --red: #c0392b;
    --text: #d4cfc8;
    --text-dim: #7a7570;
    --awakening: #c0392b;
    --succession: #4a90d9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,146,42,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(74,144,217,0.04) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(200,146,42,0.08) 0%, transparent 100%);
    pointer-events: none;
  }

  .header-eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 0 40px rgba(200,146,42,0.3);
    line-height: 1.1;
  }

  h1 span { color: var(--gold-light); }

  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  main { max-width: 1300px; margin: 0 auto; padding: 40px 20px 80px; }

  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 36px; }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    padding: 10px 16px 10px 40px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 18px;
  }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }

  .stats-bar { display: flex; gap: 2px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 4px; }
  .stat-seg { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-width: 44px; cursor: pointer; padding-bottom: 6px; transition: opacity 0.2s; }
  .stat-seg:hover { opacity: 0.8; }
  .stat-bar-fill { width: 36px; background: var(--gold); transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); min-height: 4px; }
  .stat-bar-fill.awakening { background: var(--awakening); }
  .stat-bar-fill.succession { background: var(--succession); }
  .stat-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-dim); text-align: center; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 44px; text-transform: uppercase; }
  .stat-count { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold-light); text-align: center; margin-top: 2px; }

  .section-title { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 56px; }
  .class-card { background: var(--surface); border: 1px solid var(--border); padding: 18px; transition: border-color 0.2s, transform 0.2s; position: relative; overflow: hidden; }
  .class-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); opacity: 0; transition: opacity 0.2s; }
  .class-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .class-card:hover::before { opacity: 1; }
  .class-card.hidden { display: none; }
  .class-card.awakening-card::before { background: var(--awakening); }
  .class-card.succession-card::before { background: var(--succession); }
  .class-card.mixed-card::before { background: linear-gradient(90deg, var(--awakening), var(--succession)); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .class-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; color: #fff; }
  .class-count-badge { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900; color: var(--gold-light); line-height: 1; }
  .count-label { font-size: 10px; color: var(--text-dim); text-align: right; letter-spacing: 1px; }
  .spec-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .spec-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    text-transform: uppercase;
    border: 1px solid;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
  }
  .spec-tag:hover { opacity: 0.7; }
  .spec-tag.awakening { color: var(--awakening); border-color: rgba(192,57,43,0.4); background: rgba(192,57,43,0.08); }
  .spec-tag.succession { color: #4a90d9; border-color: rgba(74,144,217,0.4); background: rgba(74,144,217,0.08); }
  .spec-tag.active.awakening { color: #fff; background: var(--awakening); border-color: var(--awakening); opacity: 1; }
  .spec-tag.active.succession { color: #fff; background: #4a90d9; border-color: #4a90d9; opacity: 1; }
  .player-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .player-chip { font-size: 12px; font-weight: 600; color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; cursor: default; transition: color 0.15s, opacity 0.2s; }
  .player-chip:hover { color: var(--text); }
  .player-chip.chip-hidden { display: none; }
  .player-chip .rank-num { color: var(--gold); font-size: 10px; margin-right: 4px; font-family: 'Cinzel', serif; }
  .player-chip.top3 { border-color: rgba(200,146,42,0.5); background: rgba(200,146,42,0.1); color: var(--gold-light); }

  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table thead tr { border-bottom: 1px solid var(--border); }
  .lb-table th { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; padding: 8px 12px; text-align: left; }
  .lb-table tbody tr { border-bottom: 1px solid rgba(42,47,58,0.5); transition: background 0.15s; }
  .lb-table tbody tr:hover { background: var(--surface); }
  .lb-table tbody tr.hidden { display: none; }
  .lb-table td { padding: 8px 12px; font-size: 14px; font-weight: 500; }
  .lb-rank { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text-dim); width: 50px; }
  .lb-rank.top1 { color: #ffd700; font-weight: 900; }
  .lb-rank.top2 { color: #c0c0c0; font-weight: 900; }
  .lb-rank.top3 { color: #cd7f32; font-weight: 900; }
  .lb-name { color: var(--text); font-weight: 600; }
  .lb-class { color: var(--text-dim); }
  .lb-spec-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 7px; border: 1px solid; text-transform: uppercase; display: inline-block; }
  .lb-spec-badge.awakening { color: var(--awakening); border-color: rgba(192,57,43,0.35); }
  .lb-spec-badge.succession { color: #4a90d9; border-color: rgba(74,144,217,0.35); }

  .history-wrap { margin-bottom: 56px; overflow-x: auto; }
  .history-table { width: 100%; border-collapse: collapse; min-width: 560px; }
  .history-table thead tr { border-bottom: 1px solid var(--border); }
  .history-table th { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; padding: 10px 12px; text-align: center; cursor: pointer; user-select: none; transition: color 0.15s; }
  .history-table th:hover { color: var(--gold); }
  .history-table th:first-child { text-align: left; }
  .history-table th.current { color: var(--gold); }
  .history-table th.sorted::after { content: ' ▼'; font-size: 9px; color: var(--gold); }
  .history-table th.sorted.asc::after { content: ' ▲'; }
  .history-table tbody tr { border-bottom: 1px solid rgba(42,47,58,0.5); transition: background 0.15s; }
  .history-table tbody tr:hover { background: var(--surface); }
  .history-table tbody tr.hidden { display: none; }
  .history-table td { padding: 8px 12px; font-size: 14px; text-align: center; }
  .history-table td.cls-name { text-align: left; font-weight: 600; color: var(--text); font-family: 'Cinzel', serif; font-size: 13px; }
  .history-cell { font-family: 'Cinzel', serif; font-weight: 600; }
  .history-cell.zero { color: var(--text-dim); opacity: 0.35; }
  .history-cell.low { color: var(--text); }
  .history-cell.med { color: var(--gold); }
  .history-cell.high { color: var(--gold-light); font-weight: 900; text-shadow: 0 0 12px rgba(232,184,75,0.4); }
  .history-cell.current-col { background: rgba(200,146,42,0.05); }
  .spark { display: inline-block; vertical-align: middle; }
  .trend-arrow { font-size: 11px; margin-left: 8px; vertical-align: middle; }
  .trend-up { color: #4ade80; }
  .trend-down { color: var(--red); }
  .trend-flat { color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Black Desert Online · NA/EU · Season 7</div>
  <h1>Arena of <span>Solare</span></h1>
  <div class="header-sub">Top 100 Leaderboard — Class Intelligence Report</div>
</header>

<main>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search player or class…" oninput="applyFilters()">
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('awakening', this)">Awakening</button>
      <button class="filter-btn" onclick="setFilter('succession', this)">Succession</button>
      <button class="filter-btn" onclick="setFilter('top5', this)">Top 5+</button>
    </div>
  </div>

  <div class="section-title">Class Representation — Top 100</div>
  <div class="stats-bar" id="statsBar"></div>

  <div class="section-title">Class Breakdown</div>
  <div class="class-grid" id="classGrid"></div>

  <div class="section-title">Season History — Top 100 Representation</div>
  <div class="history-wrap">
    <table class="history-table" id="historyTable">
      <thead>
        <tr>
          <th data-sort="cls">Class</th>
          <th data-sort="0">S4</th>
          <th data-sort="1">S5</th>
          <th data-sort="2">S6</th>
          <th data-sort="3" class="current sorted">S7</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>

  <div class="section-title">Full Leaderboard — S7</div>
  <table class="lb-table">
    <thead>
      <tr>

        <th>Player</th>
        <th>Class</th>
        <th>Spec</th>

    <tbody id="lbBody"></tbody>

</main>

const classMap = {};
players.forEach(p => { if (!classMap[p.cls]) classMap[p.cls] = []; classMap[p.cls].push(p); });
const classesSorted = Object.entries(classMap).sort((a,b) => b[1].length - a[1].length);
const maxCount = classesSorted[0][1].length;

const statsBar = document.getElementById('statsBar');
classesSorted.forEach(([cls, ps]) => {
  const specs = [...new Set(ps.map(p=>p.spec.toLowerCase()))];
  const specClass = specs.length > 1 ? '' : specs[0];
  const height = Math.max(4, (ps.length / maxCount) * 80);
  const seg = document.createElement('div');
  seg.className = 'stat-seg';
  seg.innerHTML = `<div class="stat-bar-fill ${specClass}" style="height:${height}px"></div><div class="stat-label">${cls}</div><div class="stat-count">${ps.length}</div>`;
  seg.onclick = () => { document.getElementById('searchInput').value = cls; applyFilters(); };
  statsBar.appendChild(seg);
});

const classGrid = document.getElementById('classGrid');
classesSorted.forEach(([cls, ps]) => {
  const specs = [...new Set(ps.map(p=>p.spec.toLowerCase()))];
  const specClass = specs.length > 1 ? 'mixed' : specs[0];
  const card = document.createElement('div');
  card.className = `class-card ${specClass}-card`;
  card.dataset.cls = cls.toLowerCase();
  card.dataset.count = ps.length;
  card.dataset.specs = specs.join(',');
  const chips = ps.map(p => `<span class="player-chip ${p.rank <= 3 ? 'top3' : ''}" data-spec="${p.spec.toLowerCase()}"><span class="rank-num">#${p.rank}</span>${p.name}</span>`).join('');
  const specTags = specs.map(s => `<span class="spec-tag ${s}" data-spec="${s}" title="Click to filter ${s} only">${s}</span>`).join('');
  card.innerHTML = `<div class="card-header"><div class="class-name">${cls}</div><div><div class="class-count-badge">${ps.length}</div><div class="count-label">Top 100</div></div></div><div class="spec-tags">${specTags}</div><div class="player-list">${chips}</div>`;
  classGrid.appendChild(card);

  card.querySelectorAll('.spec-tag').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.stopPropagation();
      const targetSpec = tag.dataset.spec;
      const wasActive = tag.classList.contains('active');
      card.querySelectorAll('.spec-tag').forEach(t => t.classList.remove('active'));
      if (wasActive) {
        card.querySelectorAll('.player-chip').forEach(c => c.classList.remove('chip-hidden'));
      } else {
        tag.classList.add('active');
        card.querySelectorAll('.player-chip').forEach(c => {
          c.classList.toggle('chip-hidden', c.dataset.spec !== targetSpec);
        });
      }
    });
  });
});

const lbBody = document.getElementById('lbBody');
players.forEach(p => {
  const tr = document.createElement('tr');
  tr.dataset.name = p.name.toLowerCase();
  tr.dataset.cls = p.cls.toLowerCase();
  tr.dataset.spec = p.spec.toLowerCase();
  const rankClass = p.rank === 1 ? 'top1' : p.rank === 2 ? 'top2' : p.rank === 3 ? 'top3' : '';
  tr.innerHTML = `<td class="lb-rank ${rankClass}">${p.rank}</td><td class="lb-name">${p.name}</td><td class="lb-class">${p.cls}</td><td><span class="lb-spec-badge ${p.spec.toLowerCase()}">${p.spec}</span></td>`;
  lbBody.appendChild(tr);
});

let activeFilter = 'all';
function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  document.querySelectorAll('.class-card').forEach(card => {
    const cls = card.dataset.cls;
    const count = parseInt(card.dataset.count);
    const specs = card.dataset.specs;
    let show = true;
    if (activeFilter === 'awakening' && !specs.includes('awakening')) show = false;
    if (activeFilter === 'succession' && !specs.includes('succession')) show = false;
    if (activeFilter === 'top5' && count < 5) show = false;
    if (q && !cls.includes(q) && !card.textContent.toLowerCase().includes(q)) show = false;
    card.classList.toggle('hidden', !show);
  });
  document.querySelectorAll('#lbBody tr').forEach(row => {
    const name = row.dataset.name;
    const cls = row.dataset.cls;
    const spec = row.dataset.spec;
    let show = true;
    if (activeFilter === 'awakening' && spec !== 'awakening') show = false;
    if (activeFilter === 'succession' && spec !== 'succession') show = false;
    if (q && !name.includes(q) && !cls.includes(q)) show = false;
    row.classList.toggle('hidden', !show);
  });
  document.querySelectorAll('#historyBody tr').forEach(row => {
    const cls = row.dataset.cls;
    let show = true;
    if (q && !cls.includes(q)) show = false;
    row.classList.toggle('hidden', !show);
  });
}

// Auto-compute S7 column from current players array (always stays in sync with leaderboard)
(function syncS7() {
  const s7Counts = {};
  players.forEach(p => { s7Counts[p.cls] = (s7Counts[p.cls] || 0) + 1; });
  seasonHistory.forEach(row => { row.seasons[3] = s7Counts[row.cls] || 0; });
})();

const historyMax = Math.max(...seasonHistory.flatMap(r => r.seasons));
function cellTier(v) {
  if (v === 0) return 'zero';
  if (v >= historyMax * 0.55) return 'high';
  if (v >= historyMax * 0.25) return 'med';
  return 'low';
}
function sparkline(values) {
  const w = 84, h = 22, pad = 3;
  const max = Math.max(...values, 1);
  const stepX = (w - pad*2) / (values.length - 1);
  const points = values.map((v,i) => {
    const x = pad + i * stepX;
    const y = h - pad - (v / max) * (h - pad*2);
    return [x, y];
  });
  const poly = points.map(p => p.join(',')).join(' ');
  const dots = points.map(([x,y],i) => `<circle cx="${x}" cy="${y}" r="${i === points.length-1 ? 2.2 : 1.5}" fill="${i === points.length-1 ? 'var(--gold-light)' : 'var(--gold)'}"/>`).join('');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true"><polyline points="${poly}" fill="none" stroke="var(--gold)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>${dots}</svg>`;
}
function trendArrow(values) {
  const last = values[values.length-1];
  const prev = values[values.length-2];
  if (last > prev) return `<span class="trend-arrow trend-up" title="+${last-prev} vs S6">▲</span>`;
  if (last < prev) return `<span class="trend-arrow trend-down" title="${last-prev} vs S6">▼</span>`;
  return `<span class="trend-arrow trend-flat" title="No change">▬</span>`;
}
const historyBody = document.getElementById('historyBody');
function renderHistory(sortKey = 3, asc = false) {
  const sorted = [...seasonHistory].sort((a,b) => {
    if (sortKey === 'cls') return asc ? a.cls.localeCompare(b.cls) : b.cls.localeCompare(a.cls);
    const diff = a.seasons[sortKey] - b.seasons[sortKey];
    return asc ? diff : -diff;
  });
  historyBody.innerHTML = sorted.map(row => {
    const cells = row.seasons.map((v, idx) => `<td class="history-cell ${cellTier(v)} ${idx === 3 ? 'current-col' : ''}">${v}</td>`).join('');
    return `<tr data-cls="${row.cls.toLowerCase()}"><td class="cls-name">${row.cls}</td>${cells}<td>${sparkline(row.seasons)}${trendArrow(row.seasons)}</td></tr>`;
  }).join('');
  applyFilters();
}
document.querySelectorAll('#historyTable th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    const sortKey = key === 'cls' ? 'cls' : parseInt(key);
    const wasSorted = th.classList.contains('sorted');
    const asc = wasSorted ? !th.classList.contains('asc') : (key === 'cls');
    document.querySelectorAll('#historyTable th').forEach(h => h.classList.remove('sorted','asc'));
    th.classList.add('sorted');
    if (asc) th.classList.add('asc');
    renderHistory(sortKey, asc);
  });
});
renderHistory();
